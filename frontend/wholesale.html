<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wholesale Login – ByCeleste</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-section">
    <form id="wholesaleForm" class="login-form">
      <h2>Wholesale Partner Login</h2>
      <input type="email" id="whEmail" placeholder="Email" required>
      <input type="password" id="whPassword" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
      <p id="whMsg"></p>
    </form>
  </section>
  <script src="scripts.js"></script>
</body>
</html>
